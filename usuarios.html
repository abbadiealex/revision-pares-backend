<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Usuarios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="dashboard-profesor.html">Revisión por Pares</a>
      <div class="ms-auto">
        <a href="dashboard-profesor.html" class="btn btn-light btn-sm">Volver</a>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="page-title mb-0">Gestión de usuarios</h2>
      <button class="btn btn-dark" data-bs-toggle="modal" data-bs-target="#modalUsuario">Agregar usuario</button>
    </div>

    <div class="card card-shadow p-3">
      <div class="table-responsive">
        <table class="table table-hover">
          <thead class="table-light">
            <tr>
              <th>Nombre</th>
              <th>Correo</th>
              <th>Rol</th>
              <th>Estado</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Alejandro Ortega</td>
              <td>alex@iteso.mx</td>
              <td><span class="badge text-bg-primary">Alumno</span></td>
              <td><span class="badge text-bg-success">Activo</span></td>
              <td><button class="btn btn-outline-secondary btn-sm">Editar</button></td>
            </tr>
            <tr>
              <td>María López</td>
              <td>maria@iteso.mx</td>
              <td><span class="badge text-bg-success">Evaluador</span></td>
              <td><span class="badge text-bg-success">Activo</span></td>
              <td><button class="btn btn-outline-secondary btn-sm">Editar</button></td>
            </tr>
            <tr>
              <td>Uriel Robles</td>
              <td>uriel@iteso.mx</td>
              <td><span class="badge text-bg-dark">Profesor</span></td>
              <td><span class="badge text-bg-success">Activo</span></td>
              <td><button class="btn btn-outline-secondary btn-sm">Editar</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalUsuario" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <form class="needs-validation" novalidate>
          <div class="modal-header">
            <h5 class="modal-title">Agregar usuario</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Nombre</label>
              <input type="text" class="form-control" required>
              <div class="invalid-feedback">El nombre es obligatorio.</div>
            </div>

            <div class="mb-3">
              <label class="form-label">Correo</label>
              <input type="email" class="form-control" required>
              <div class="invalid-feedback">Ingresa un correo válido.</div>
            </div>

            <div class="mb-3">
              <label class="form-label">Rol</label>
              <select class="form-select" required>
                <option value="">Selecciona un rol</option>
                <option>Alumno</option>
                <option>Evaluador</option>
                <option>Profesor</option>
              </select>
              <div class="invalid-feedback">Selecciona un rol.</div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-dark">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (() => {
      'use strict';
      const forms = document.querySelectorAll('.needs-validation');

      Array.from(forms).forEach(form => {
        form.addEventListener('submit', event => {
          if (!form.checkValidity()) {
            event.preventDefault();
            event.stopPropagation();
          } else {
            event.preventDefault();
            alert('Usuario guardado correctamente (simulado)');
          }
          form.classList.add('was-validated');
        }, false);
      });
    })();
  </script>
</body>
</html>
