<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subir Tarea</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="dashboard-alumno.html">Revisión por Pares</a>
      <div class="ms-auto">
        <a href="dashboard-alumno.html" class="btn btn-light btn-sm">Volver</a>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <h2 class="page-title">Subir tarea</h2>

    <div class="card card-shadow p-4">
      <form class="needs-validation" novalidate>
        <div class="mb-3">
          <label class="form-label" for="nombreTarea">Nombre de la tarea</label>
          <input type="text" class="form-control" id="nombreTarea" required>
          <div class="invalid-feedback">El nombre de la tarea es obligatorio.</div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="materia">Materia</label>
          <select class="form-select" id="materia" required>
            <option value="">Selecciona una materia</option>
            <option>Desarrollo de Aplicaciones y Servicios Web</option>
            <option>Interfaces Web</option>
            <option>Bases de Datos</option>
          </select>
          <div class="invalid-feedback">Selecciona una materia.</div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="archivo">Archivo PDF</label>
          <input type="file" class="form-control" id="archivo" accept=".pdf" required>
          <div class="invalid-feedback">Debes subir un archivo PDF.</div>
        </div>

        <div class="alert alert-success d-none" id="successMsg">
          Tarea subida correctamente. Los evaluadores fueron asignados.
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Subir tarea</button>
          <a href="mis-entregas.html" class="btn btn-outline-secondary">Ver mis entregas</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    (() => {
      'use strict';
      const forms = document.querySelectorAll('.needs-validation');
      const successMsg = document.getElementById('successMsg');
      const archivoInput = document.getElementById('archivo');

      Array.from(forms).forEach(form => {
        form.addEventListener('submit', event => {
          const file = archivoInput.files[0];
          let validPDF = true;

          if (file && !file.name.toLowerCase().endsWith('.pdf')) {
            validPDF = false;
            archivoInput.setCustomValidity('Archivo inválido');
          } else {
            archivoInput.setCustomValidity('');
          }

          if (!form.checkValidity() || !validPDF) {
            event.preventDefault();
            event.stopPropagation();
          } else {
            event.preventDefault();
            successMsg.classList.remove('d-none');
            form.reset();
            form.classList.remove('was-validated');
          }

          form.classList.add('was-validated');
        }, false);
      });
    })();
  </script>
</body>
</html>
