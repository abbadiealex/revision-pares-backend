<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Profesor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="dashboard-profesor.html">Revisión por Pares</a>
      <div class="ms-auto">
        <a href="login.html" class="btn btn-light btn-sm" data-logout>Cerrar sesión</a>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <h2 class="page-title">Dashboard del Profesor</h2>
    <p class="small-muted">Bienvenido, Prof. Uriel Robles.</p>

    <div class="row g-4">
      <div class="col-md-3">
        <div class="card card-shadow p-3 text-center">
          <div class="card-body">
            <h3>24</h3>
            <p class="mb-0">Tareas entregadas</p>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card card-shadow p-3 text-center">
          <div class="card-body">
            <h3>18</h3>
            <p class="mb-0">Tareas evaluadas</p>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card card-shadow p-3 text-center">
          <div class="card-body">
            <h3>3</h3>
            <p class="mb-0">Rúbricas activas</p>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card card-shadow p-3 text-center">
          <div class="card-body">
            <h3>35</h3>
            <p class="mb-0">Usuarios registrados</p>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-4 section-space">
      <div class="col-md-4">
        <a href="revision-profesor.html" class="btn btn-dark w-100 p-3">Revisar evaluaciones</a>
      </div>
      <div class="col-md-4">
        <a href="rubricas.html" class="btn btn-outline-dark w-100 p-3">Gestionar rúbricas</a>
      </div>
      <div class="col-md-4">
        <a href="usuarios.html" class="btn btn-outline-secondary w-100 p-3">Gestionar usuarios</a>
      </div>
    </div>
  </div>
  <script src="js/auth.js"></script>
  <script>
    Auth.requireRole('profesor');
  </script>
</body>
</html>
