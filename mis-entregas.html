<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Entregas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="dashboard-alumno.html">Revisión por Pares</a>
      <div class="ms-auto d-flex gap-2">
        <a href="dashboard-alumno.html" class="btn btn-light btn-sm">Volver</a>
        <a href="login.html" class="btn btn-outline-light btn-sm" data-logout>Cerrar sesión</a>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <h2 class="page-title">Mis entregas</h2>
    <div class="alert alert-info" id="loadingMsg">Cargando entregas reales...</div>
    <div class="alert alert-danger d-none" id="errorMsg"></div>

    <div class="card card-shadow p-3">
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead class="table-light">
            <tr>
              <th>Tarea</th>
              <th>Fecha</th>
              <th>Estado</th>
              <th>Calificación</th>
              <th>Comentario</th>
              <th>Archivo</th>
            </tr>
          </thead>
          <tbody id="tareasBody">
            <tr>
              <td colspan="6" class="text-muted">Sin datos cargados.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    (() => {
      'use strict';

      const user = Auth.requireRole('alumno');
      if (!user) return;

      const tableBody = document.getElementById('tareasBody');
      const loadingMsg = document.getElementById('loadingMsg');
      const errorMsg = document.getElementById('errorMsg');

      function formatDate(value) {
        if (!value) return '-';
        return new Date(value).toLocaleDateString('es-MX');
      }

      function badgeClass(estado) {
        if (estado === 'cerrada') return 'text-bg-success';
        if (estado === 'en_revision') return 'text-bg-warning';
        return 'text-bg-secondary';
      }

      function renderTareas(tareas) {
        tableBody.innerHTML = '';

        if (!tareas.length) {
          tableBody.innerHTML = '<tr><td colspan="6" class="text-muted">Todavía no has subido tareas.</td></tr>';
          return;
        }

        tareas.forEach((tarea) => {
          const row = document.createElement('tr');
          const calificacion = tarea.estado === 'cerrada' && tarea.calificacion_final !== null
            ? tarea.calificacion_final
            : 'Disponible al cierre';
          const comentario = tarea.estado === 'cerrada' && tarea.comentario_final
            ? tarea.comentario_final
            : 'En espera de cierre por profesor.';
          const archivo = tarea.archivo_url
            ? `<a href="${Auth.API_BASE_URL.replace('/api', '')}${tarea.archivo_url}" target="_blank" rel="noopener">Ver PDF</a>`
            : '-';

          row.innerHTML = `
            <td>${tarea.titulo || '-'}</td>
            <td>${formatDate(tarea.fecha_entrega || tarea.createdAt)}</td>
            <td><span class="badge ${badgeClass(tarea.estado)}">${tarea.estado}</span></td>
            <td>${calificacion}</td>
            <td>${comentario}</td>
            <td>${archivo}</td>
          `;
          tableBody.appendChild(row);
        });
      }

      async function loadTareas() {
        try {
          const data = await Auth.apiFetch('/tareas/mias?page=1&limit=100');
          renderTareas(data.items || []);
        } catch (error) {
          errorMsg.textContent = error.message;
          errorMsg.classList.remove('d-none');
        } finally {
          loadingMsg.classList.add('d-none');
        }
      }

      loadTareas();
    })();
  </script>
</body>
</html>
