<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Revisión por Pares</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container d-flex justify-content-center align-items-center login-wrapper">
    <div class="card login-card p-4">
      <div class="card-body">
        <h1 class="text-center mb-2">Plataforma de Revisión por Pares</h1>
        <p class="text-center text-muted mb-4">Inicia sesión para continuar</p>

        <form class="needs-validation" id="loginForm" novalidate>
          <div class="mb-3">
            <label for="correo" class="form-label">Correo institucional</label>
            <input type="email" class="form-control" id="correo" placeholder="alex@iteso.mx" required>
            <div class="invalid-feedback">
              Ingresa un correo válido.
            </div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="password" placeholder="Alumno123" required>
            <div class="invalid-feedback">
              La contraseña es obligatoria.
            </div>
          </div>

          <div class="alert alert-danger d-none" id="errorMsg">
            Correo o contraseña incorrectos.
          </div>

          <button type="submit" class="btn btn-primary w-100 mb-3" id="loginSubmit">
            Iniciar sesión
          </button>
        </form>

        <hr>

        <p class="text-center fw-semibold">Credenciales demo</p>
        <div class="d-grid gap-2">
          <button type="button" class="btn btn-outline-dark" data-demo-correo="profesor@iteso.mx" data-demo-password="Profesor123">
            Usar Profesor
          </button>
          <button type="button" class="btn btn-outline-primary" data-demo-correo="alex@iteso.mx" data-demo-password="Alumno123">
            Usar Alumno
          </button>
          <button type="button" class="btn btn-outline-success" data-demo-correo="evaluador@iteso.mx" data-demo-password="Evaluador123">
            Usar Evaluador
          </button>
        </div>

        <p class="text-center mt-4 footer-note">
          Backend: https://revision-pares-backend.onrender.com/api
        </p>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    (() => {
      'use strict';

      const form = document.getElementById('loginForm');
      const correoInput = document.getElementById('correo');
      const passwordInput = document.getElementById('password');
      const errorMsg = document.getElementById('errorMsg');
      const submitButton = document.getElementById('loginSubmit');
      const currentUser = Auth.getCurrentUser();

      if (Auth.getToken() && currentUser) {
        Auth.redirectToDashboard(currentUser.rol);
        return;
      }

      document.querySelectorAll('[data-demo-correo]').forEach((button) => {
        button.addEventListener('click', () => {
          correoInput.value = button.dataset.demoCorreo;
          passwordInput.value = button.dataset.demoPassword;
          errorMsg.classList.add('d-none');
          form.classList.remove('was-validated');
        });
      });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        event.stopPropagation();
        errorMsg.classList.add('d-none');

        if (!form.checkValidity()) {
          form.classList.add('was-validated');
          return;
        }

        submitButton.disabled = true;
        submitButton.textContent = 'Ingresando...';

        try {
          const { user } = await Auth.login(correoInput.value.trim(), passwordInput.value);
          Auth.redirectToDashboard(user.rol);
        } catch (error) {
          errorMsg.textContent = error.message || 'No fue posible iniciar sesión.';
          errorMsg.classList.remove('d-none');
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = 'Iniciar sesión';
          form.classList.add('was-validated');
        }
      });
    })();
  </script>
</body>
</html>
