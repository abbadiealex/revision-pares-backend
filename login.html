<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Revisión por Pares</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container d-flex justify-content-center align-items-center login-wrapper">
    <div class="card login-card p-4">
      <div class="card-body">
        <h1 class="text-center mb-2">Plataforma de Revisión por Pares</h1>
        <p class="text-center text-muted mb-4">Inicia sesión para continuar</p>

        <form class="needs-validation" novalidate>
          <div class="mb-3">
            <label for="correo" class="form-label">Correo institucional</label>
            <input type="email" class="form-control" id="correo" placeholder="alex@iteso.mx" required>
            <div class="invalid-feedback">
              Ingresa un correo válido.
            </div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="password" placeholder="123456" required>
            <div class="invalid-feedback">
              La contraseña es obligatoria.
            </div>
          </div>

          <div class="alert alert-danger d-none" id="errorMsg">
            Correo o contraseña incorrectos.
          </div>

          <button type="submit" class="btn btn-primary w-100 mb-3">Iniciar sesión</button>
        </form>

        <hr>

        <p class="text-center fw-semibold">Accesos rápidos para simular roles</p>
        <div class="d-grid gap-2">
          <a href="dashboard-alumno.html" class="btn btn-outline-primary">Entrar como Alumno</a>
          <a href="dashboard-evaluador.html" class="btn btn-outline-success">Entrar como Evaluador</a>
          <a href="dashboard-profesor.html" class="btn btn-outline-dark">Entrar como Profesor</a>
        </div>

        <p class="text-center mt-4 footer-note">
          Datos de ejemplo: alex@iteso.mx / 123456
        </p>
      </div>
    </div>
  </div>

  <script>
    (() => {
      'use strict';
      const forms = document.querySelectorAll('.needs-validation');

      Array.from(forms).forEach(form => {
        form.addEventListener('submit', event => {
          if (!form.checkValidity()) {
            event.preventDefault();
            event.stopPropagation();
          } else {
            event.preventDefault();
            window.location.href = "dashboard-alumno.html";
          }
          form.classList.add('was-validated');
        }, false);
      });
    })();
  </script>
</body>
</html>
