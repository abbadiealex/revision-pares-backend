<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revisión por Pares</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">Revisión por Pares</a>
      <div class="ms-auto">
        <a href="login.html" class="btn btn-light btn-sm">Iniciar sesión</a>
      </div>
    </div>
  </nav>

  <main class="container d-flex justify-content-center align-items-center login-wrapper">
    <div class="card login-card p-4">
      <div class="card-body text-center">
        <h1 class="mb-3">Plataforma de Revisión por Pares</h1>
        <p class="text-muted mb-4">
          Gestiona entregas, revisiones y calificaciones con acceso por rol.
        </p>
        <a href="login.html" class="btn btn-primary w-100">Iniciar sesión</a>
      </div>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script>
    (() => {
      const token = Auth.getToken();
      const user = Auth.getCurrentUser();

      if (token && user) {
        Auth.redirectToDashboard(user.rol);
      }
    })();
  </script>
</body>
</html>
